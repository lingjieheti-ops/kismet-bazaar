name: deploy

# One-shot Testnet deployment, run by hand. Deploys the oracle, the genesis
# Istanbul-rain trigger, and the bazaar; runs the genesis scenario (register
# rain source + list peril 0); writes deployments/casper-test.json and
# commits it. After this, run the keeper workflow once with
# keeper-state/bootstrap-commands.json to open the syndicates.

on:
  workflow_dispatch:
    inputs:
      node:
        description: "Casper RPC node base URL (client appends /rpc)"
        required: false
        default: "https://node.testnet.casper.network"
      events:
        description: "Casper SSE events URL"
        required: false
        default: "https://node.testnet.casper.network/events/main"

concurrency:
  group: keeper
  cancel-in-progress: false

env:
  NODE_ADDRESS: ${{ inputs.node || 'https://node.testnet.casper.network' }}
  EVENTS_URL: ${{ inputs.events || 'https://node.testnet.casper.network/events/main' }}

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Materialize deployer key
        run: |
          mkdir -p /tmp/keys
          printf '%s' "${{ secrets.CASPER_KEY_MAIN }}" > /tmp/keys/main.pem
          chmod 600 /tmp/keys/main.pem

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-01-01
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Install cargo-odra
        uses: taiki-e/cache-cargo-install-action@v2
        with:
          tool: cargo-odra@0.1.7

      - name: Install wasm tools
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q wabt
          curl -sL https://github.com/WebAssembly/binaryen/releases/download/version_130/binaryen-version_130-x86_64-linux.tar.gz | tar xz
          echo "$PWD/binaryen-version_130/bin" >> "$GITHUB_PATH"

      - name: Build wasm
        working-directory: contracts
        run: cargo odra build

      - name: Node preflight (what can this runner actually reach?)
        run: |
          echo "--- RPC: $NODE_ADDRESS/rpc"
          curl -sS -m 15 -X POST "$NODE_ADDRESS/rpc" \
            -H 'Content-Type: application/json' \
            -d '{"jsonrpc":"2.0","id":1,"method":"info_get_status"}' | head -c 500 || echo " (RPC unreachable)"
          echo ""
          echo "--- Events: $EVENTS_URL"
          curl -sS -m 8 -N "$EVENTS_URL" | head -c 300 || echo " (events endpoint closed/streamed out — acceptable)"
          echo ""
          echo "--- Alternates, for the record:"
          curl -sS -m 10 -X POST "http://node.testnet.casper.network:7777/rpc" -H 'Content-Type: application/json' -d '{"jsonrpc":"2.0","id":1,"method":"info_get_status"}' | head -c 200 || echo "node.testnet.casper.network:7777 unreachable"

      - name: Deploy stack + genesis
        working-directory: contracts
        env:
          ODRA_CASPER_LIVENET_NODE_ADDRESS: ${{ inputs.node || 'https://rpc.testnet.casperlabs.io' }}
          ODRA_CASPER_LIVENET_EVENTS_URL: ${{ inputs.events || 'https://events.testnet.casperlabs.io/events' }}
          ODRA_CASPER_LIVENET_CHAIN_NAME: casper-test
          ODRA_CASPER_LIVENET_SECRET_KEY_PATH: /tmp/keys/main.pem
          CSPR_CLOUD_AUTH_TOKEN: ${{ secrets.CSPR_CLOUD_AUTH_TOKEN }}
        run: |
          cargo run --bin contracts_cli -- deploy
          # odra-cli exits 0 even on deploy errors; the record file is the truth.
          test -f resources/deployed_contracts.toml || { echo "No deployment record produced — deploy failed."; exit 1; }
          cargo run --bin contracts_cli -- scenario genesis

      - name: Extract deployment addresses
        id: extract
        run: |
          mkdir -p deployments
          if node scripts/extract-deployments.mjs contracts/resources deployments/casper-test.json; then
            cat deployments/casper-test.json
          else
            echo "extract_failed=true" >> "$GITHUB_OUTPUT"
            echo "Extraction failed; raw deployment records follow for parser repair:"
            ls -la contracts/resources/ || true
            cat contracts/resources/*.toml || true
          fi

      - name: Commit deployment record
        # The on-chain deployment already happened and cost real testnet CSPR;
        # commit whatever records exist even if the address parser tripped.
        run: |
          git config user.name "kismet-keeper"
          git config user.email "keeper@kismet.invalid"
          git add -f deployments/ contracts/resources/ || true
          git commit -m "deploy: KISMET stack on casper-test" || echo "nothing to commit"
          git pull --rebase origin main || true
          git push || true

      - name: Surface extraction failure
        if: steps.extract.outputs.extract_failed == 'true'
        run: |
          echo "Deployment succeeded but address extraction failed; fix scripts/extract-deployments.mjs against the committed records."
          exit 1
