name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  contracts:
    name: contracts (test + wasm)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-01-01
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Install cargo-odra
        uses: taiki-e/cache-cargo-install-action@v2
        with:
          tool: cargo-odra@0.1.7

      - name: Install wasm tools
        # apt's binaryen is too old for the wasm features rustc emits;
        # use the official release instead.
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q wabt
          curl -sL https://github.com/WebAssembly/binaryen/releases/download/version_130/binaryen-version_130-x86_64-linux.tar.gz | tar xz
          echo "$PWD/binaryen-version_130/bin" >> "$GITHUB_PATH"

      - name: Tests (OdraVM)
        run: cargo odra test

      - name: Native bins compile (cli, executor)
        run: cargo check --bins

      - name: Build wasm
        run: cargo odra build

      - name: Upload wasm artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kismet-wasm
          path: contracts/wasm/*.wasm

  agents:
    name: agents (typecheck + test + demo)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: agents/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
        env:
          KISMET_RETRY_DELAY_MS: "0"
      - name: Keyless demo (the 20-second floor)
        run: npm run demo

  web:
    name: web (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  integrity:
    name: integrity gate (no reviewer manipulation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/check-integrity.mjs
